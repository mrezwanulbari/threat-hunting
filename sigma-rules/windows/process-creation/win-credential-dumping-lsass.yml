title: LSASS Memory Access for Credential Dumping
id: a2b3c4d5-e6f7-8901-2345-678901bcdef0
status: stable
level: critical
description: Detects attempts to access LSASS process memory for credential dumping (Mimikatz, ProcDump, comsvcs.dll).
author: Shakil Md. Rezwanul Bari
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1003/001/
logsource:
    category: process_access
    product: windows
detection:
    selection_target:
        TargetImage|endswith: '\\lsass.exe'
    selection_access:
        GrantedAccess|contains:
            - '0x1010'
            - '0x1038'
            - '0x1F0FFF'
            - '0x1F1FFF'
    filter_legitimate:
        SourceImage|endswith:
            - '\\MsMpEng.exe'
            - '\\csrss.exe'
            - '\\wmiprvse.exe'
            - '\\svchost.exe'
    condition: selection_target and selection_access and not filter_legitimate
falsepositives:
    - Antivirus/EDR scanning LSASS
    - Windows Defender credential guard
tags:
    - attack.credential_access
    - attack.t1003.001

title: Suspicious PowerShell Encoded Command Execution
id: f1e2d3c4-b5a6-7890-1234-567890abcdef
status: stable
level: high
description: Detects PowerShell execution with encoded commands used to obfuscate malicious scripts.
author: Shakil Md. Rezwanul Bari
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1059/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection_encoded:
        CommandLine|contains:
            - '-enc '
            - '-EncodedCommand'
            - '-ec '
        Image|endswith:
            - '\\powershell.exe'
            - '\\pwsh.exe'
    selection_bypass:
        CommandLine|contains:
            - '-nop'
            - '-WindowStyle Hidden'
            - '-ep bypass'
            - '-ExecutionPolicy Bypass'
    condition: selection_encoded and selection_bypass
falsepositives:
    - Legitimate admin scripts
    - Configuration management tools (SCCM, Ansible)
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1027

title: Linux Reverse Shell Execution
id: e6f7a8b9-c0d1-2345-6789-012345f01234
status: stable
level: critical
description: Detects common reverse shell patterns on Linux (bash, Python, Perl, netcat).
author: Shakil Md. Rezwanul Bari
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1059/004/
logsource:
    category: process_creation
    product: linux
detection:
    selection_bash:
        CommandLine|contains:
            - 'bash -i >& /dev/tcp/'
            - 'bash -c "sh -i >& /dev/tcp/'
    selection_python:
        CommandLine|contains:
            - 'python -c "import socket,subprocess,os'
            - 'python3 -c "import socket,subprocess,os'
    selection_netcat:
        CommandLine|contains:
            - 'nc -e /bin/sh'
            - 'nc -e /bin/bash'
            - 'ncat -e /bin/sh'
    condition: selection_bash or selection_python or selection_netcat
falsepositives:
    - Authorized penetration testing
tags:
    - attack.execution
    - attack.t1059.004
    - attack.command_and_control
